name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Format check
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "Files not formatted:"
            echo "$output"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

  test:
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test on Unix
        if: runner.os != 'Windows'
        run: go test -race ./...

      - name: Test on Windows
        if: runner.os == 'Windows'
        run: go test ./...

      - name: Build
        run: go build ./cmd/no-mistakes

  release-please:
    needs: [check, test]
    if: |
      !cancelled() &&
      (needs.check.result == 'success' || needs.check.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    runs-on: ubuntu-latest
    needs: release-please
    if: |
      !cancelled() &&
      needs.release-please.result == 'success' &&
      needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}
        run: |
          set -euo pipefail
          mkdir -p dist
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          COMMIT="$(git rev-parse --short=7 HEAD)"
          BIN="no-mistakes"
          OUT="dist/${BIN}"
          if [ "$GOOS" = "windows" ]; then
            BIN="${BIN}.exe"
            OUT="dist/${BIN}"
          fi
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build -ldflags "-X github.com/kunchenguid/no-mistakes/internal/buildinfo.Version=${TAG} -X github.com/kunchenguid/no-mistakes/internal/buildinfo.Commit=${COMMIT} -X github.com/kunchenguid/no-mistakes/internal/buildinfo.Date=${DATE} -X github.com/kunchenguid/no-mistakes/internal/buildinfo.TelemetryWebsiteID=${UMAMI_WEBSITE_ID}" \
            -o "$OUT" ./cmd/no-mistakes
          if [ "$GOOS" = "windows" ]; then
            ARCHIVE="dist/no-mistakes-${TAG}-${GOOS}-${GOARCH}.zip"
            (
              cd dist
              zip -q "$(basename "$ARCHIVE")" "$BIN"
            )
          else
            ARCHIVE="dist/no-mistakes-${TAG}-${GOOS}-${GOARCH}.tar.gz"
            tar -C dist -czf "$ARCHIVE" "$BIN"
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" "$ARCHIVE" --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}

  checksums:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build-and-upload
    if: |
      !cancelled() &&
      needs.release-please.result == 'success' &&
      needs.build-and-upload.result == 'success' &&
      needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum no-mistakes-* > ../checksums.txt
          )

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" checksums.txt --clobber

  finalize:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build-and-upload
      - checksums
    if: |
      !cancelled() &&
      needs.release-please.result == 'success' &&
      needs.build-and-upload.result == 'success' &&
      needs.checksums.result == 'success' &&
      needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Publish draft release as latest
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false --latest=true
